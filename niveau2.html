<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Claudius Labyrinthe Magique N2</title>

<style>
body{
margin:0;
background:linear-gradient(#10141f,#050505);
font-family:Arial;
color:white;
text-align:center;
padding:10px;
}

#game{
display:grid;
grid-template-columns:repeat(14,1fr);
gap:3px;
max-width:700px;
margin:auto;
padding:6px;
background:#222;
border-radius:15px;
}

.cell{
aspect-ratio:1;
display:flex;
justify-content:center;
align-items:center;
background:#eadfca;
border-radius:6px;
font-size:22px;
}

.wall{background:#111;}
.doorR{background:#8b1f1f;}
.doorB{background:#203b8b;}
.exit{background:#ff9b2e;}

#msg{
margin:12px auto;
padding:10px;
max-width:700px;
background:#111;
border-radius:12px;
min-height:50px;
color:#ffd88f;
}

button{
padding:10px;
margin:5px;
font-size:22px;
border:none;
border-radius:10px;
background:#ff8a00;
color:white;
}
</style>
</head>
<body>

<h1>Claudius Labyrinthe Magique N2</h1>

<div>
🔴 <span id="r">0</span>/1
🔵 <span id="b">0</span>/1
🟡 <span id="j">0</span>/1
&nbsp;&nbsp;
🔑 Rouge:<span id="kr">❌</span>
🔑 Bleu:<span id="kb">❌</span>
</div>

<div id="game"></div>

<div id="msg">
Trouve les clés, ouvre les portes et retrouve les couleurs.
</div>

<div>
<button onclick="move(0,-1)">▲</button><br>
<button onclick="move(-1,0)">◀</button>
<button onclick="move(0,1)">▼</button>
<button onclick="move(1,0)">▶</button>
</div>

<script>

const base=[
"##############",
"#P..r.#....KR#",
"#.##.#.###.#.#",
"#....#...#.#.#",
"###R####.#.#.#",
"#....#...#...#",
"#.######.###.#",
"#..B..T..Kb..#",
"#####.#####..#",
"#....#....#..#",
"#..J.#.S..#..#",
"##############"
];

let map=base.map(r=>r.split(""));
let x=1,y=1;

let red=0;
let blue=0;
let yellow=0;

let keyR=false;
let keyB=false;

let direction="bas";

const game=document.getElementById("game");

draw();

function draw(){

game.innerHTML="";

for(let j=0;j<map.length;j++){

for(let i=0;i<map[j].length;i++){

let c=document.createElement("div");
c.className="cell";

let v=map[j][i];

if(v=="#") c.classList.add("wall");

if(v=="P"){
c.innerHTML=
`<img src="claudius-${direction}.png"
style="width:90%">`;
}

if(v=="r") c.innerHTML="🔴";
if(v=="B") c.innerHTML="🔵";
if(v=="J") c.innerHTML="🟡";

if(v=="KR") c.innerHTML="🔑";
if(v=="Kb") c.innerHTML="🗝";

if(v=="R"){
c.innerHTML="🚪";
c.classList.add("doorR");
}

if(v=="T") c.innerHTML="🌀";

if(v=="S"){
c.innerHTML="☀️";
c.classList.add("exit");
}

game.appendChild(c);

}

}

}

function move(dx,dy){

if(dx==1)direction="gauche";
if(dx==-1)direction="droite";
if(dy==1)direction="bas";
if(dy==-1)direction="haut";

let nx=x+dx;
let ny=y+dy;

let t=map[ny][nx];

if(t=="#")return;

if(t=="R" && !keyR){
msg("La porte rouge est fermée");
return;
}

if(t=="r"){
red=1;
document.getElementById("r").textContent=1;
msg("Rouge retrouvé");
}

if(t=="B"){
blue=1;
document.getElementById("b").textContent=1;
msg("Bleu retrouvé");
}

if(t=="J"){
yellow=1;
document.getElementById("j").textContent=1;
msg("Jaune retrouvé");
}

if(t=="KR"){
keyR=true;
document.getElementById("kr").textContent="✅";
msg("Clé rouge trouvée");
}

if(t=="Kb"){
keyB=true;
document.getElementById("kb").textContent="✅";
msg("Clé bleue trouvée");
}

if(t=="T"){
nx=2;
ny=9;
msg("Téléportation");
}

if(t=="S"){
if(red&&blue&&yellow){
msg("✨ Bravo Claude");
}else{
msg("Il manque encore des éléments");
return;
}
}

map[y][x]=".";
x=nx;
y=ny;
map[y][x]="P";

draw();

}

function msg(t){
document.getElementById("msg").innerHTML=t;
}

window.addEventListener("keydown",(e)=>{

if(e.key=="ArrowUp")move(0,-1);
if(e.key=="ArrowDown")move(0,1);
if(e.key=="ArrowLeft")move(-1,0);
if(e.key=="ArrowRight")move(1,0);

});

</script>

</body>
</html>
